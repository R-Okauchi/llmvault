<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLMVault — Connection Request</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        color: #1a1a2e;
        background: #fafafa;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .consent {
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .consent__icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      .origin {
        font-size: 20px;
        font-weight: 700;
        color: #2563eb;
        word-break: break-all;
        margin-bottom: 4px;
      }
      .origin-full {
        font-size: 11px;
        color: #94a3b8;
        word-break: break-all;
        margin-bottom: 16px;
      }
      .description {
        font-size: 13px;
        color: #475569;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .btn {
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-width: 100px;
      }
      .btn--primary {
        background: #2563eb;
        color: #fff;
      }
      .btn--primary:hover {
        background: #1d4ed8;
      }
      .btn--secondary {
        background: #f1f5f9;
        color: #334155;
        border: 1px solid #e2e8f0;
      }
      .btn--secondary:hover {
        background: #e2e8f0;
      }
      .warning {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
