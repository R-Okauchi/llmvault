<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyquill — Connection Request</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        color: #1a1a2e;
        background: #fafafa;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .consent {
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .consent__icon {
        width: 64px;
        height: 64px;
        object-fit: contain;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      .origin {
        font-size: 20px;
        font-weight: 700;
        color: #2563eb;
        word-break: break-all;
        margin-bottom: 4px;
      }
      .origin-full {
        font-size: 11px;
        color: #94a3b8;
        word-break: break-all;
        margin-bottom: 16px;
      }
      .description {
        font-size: 13px;
        color: #475569;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .btn {
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-width: 100px;
      }
      .btn--primary {
        background: #2563eb;
        color: #fff;
      }
      .btn--primary:hover {
        background: #1d4ed8;
      }
      .btn--secondary {
        background: #f1f5f9;
        color: #334155;
        border: 1px solid #e2e8f0;
      }
      .btn--secondary:hover {
        background: #e2e8f0;
      }
      .warning {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 16px;
        line-height: 1.5;
      }
      .picker-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
        text-align: left;
      }
      .picker {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
        max-height: 180px;
        overflow-y: auto;
      }
      .picker__option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }
      .picker__option:hover {
        border-color: #cbd5e1;
      }
      .picker__option--selected {
        border-color: #2563eb;
        background: #eff6ff;
      }
      .picker__option input {
        flex-shrink: 0;
      }
      .picker__label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
        flex: 1;
      }
      .picker__name {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a2e;
      }
      .picker__meta {
        font-size: 11px;
        color: #64748b;
      }
      .empty-keys {
        padding: 16px;
        background: #fef3c7;
        color: #78350f;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 20px;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Request-approval variant ── */
      .consent--compact {
        max-width: 400px;
      }
      .consent--compact h1 {
        margin-bottom: 8px;
      }
      .btn--ghost {
        background: transparent;
        color: #334155;
        border: 1px solid #cbd5e1;
      }
      .btn--ghost:hover {
        background: #f1f5f9;
      }
      .rq-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 12px;
        margin: 16px 0;
        text-align: left;
      }
      .rq-label {
        font-size: 11px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        align-self: center;
      }
      .rq-value {
        font-size: 13px;
        color: #1a1a2e;
        font-weight: 500;
        word-break: break-all;
      }
      .rq-value--mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
      .rq-reason {
        font-size: 12px;
        color: #475569;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 16px;
        text-align: left;
      }
      .rq-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .rq-actions .btn {
        min-width: 80px;
        padding: 8px 16px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
