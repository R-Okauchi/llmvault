name: Integration

# Live-API matrix tests. Run off a GitHub Environment so secrets are
# scoped; PRs (including from forks) never trigger this workflow — that
# prevents secret exfiltration via a malicious PR.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *" # 09:17 UTC nightly
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  integration:
    # Guard against forks running this via workflow_dispatch on their copy.
    if: github.repository == 'R-Okauchi/keyquill'
    runs-on: ubuntu-latest
    environment: integration
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run live-API matrix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pnpm --filter keyquill-extension test:integration \
            --reporter=default --reporter=json \
            --outputFile=integration-report.json

      - name: Matrix summary
        if: always()
        run: |
          node scripts/summarize-integration.mjs \
            packages/keyquill-extension/integration-report.json \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: packages/keyquill-extension/integration-report.json
          if-no-files-found: ignore
